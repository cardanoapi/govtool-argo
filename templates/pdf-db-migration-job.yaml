{{- $pdfDbMigration := .Values.pdfDbMigration | default dict -}}
{{- if $pdfDbMigration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: govtool-pdf-db-migration
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: restore
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: {{ $pdfDbMigration.dbHost | quote }}
            - name: PGDATABASE
              value: {{ $pdfDbMigration.dbName | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pdfDbMigration.dbUserSecret }}
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pdfDbMigration.dbUserSecret }}
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE"; do
                echo "waiting for postgres..."
                sleep 5
              done

              psql \
                -h "$PGHOST" \
                -U "$PGUSER" \
                -d "$PGDATABASE" \
                -v ON_ERROR_STOP=1 \
                -f /migration/{{ .Values.pdfDbMigration.fileName }}
          volumeMounts:
            - name: migration
              mountPath: /migration
              readOnly: true
      volumes:
        - name: migration
          configMap:
            name: {{ .Values.pdfDbMigration.configMapName }}
            
{{- end }}