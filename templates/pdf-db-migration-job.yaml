{{- $pdfDbMigration := .Values.pdfDbMigration | default dict -}}
{{- if $pdfDbMigration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: govtool-pdf-db-migration
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: restore
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: {{ $pdfDbMigration.dbHost | quote }}
            - name: PGDATABASE
              value: {{ $pdfDbMigration.dbName | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pdfDbMigration.dbUserSecret }}
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pdfDbMigration.dbUserSecret }}
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE"; do
                echo "waiting for postgres..."
                sleep 5
              done

              pg_restore \
                --clean \
                --if-exists \
                --no-owner \
                --no-privileges \
                -h "$PGHOST" \
                -U "$PGUSER" \
                -d "$PGDATABASE" \
                /dump/{{ .Values.pdfDbMigration.dumpFileName }}
          volumeMounts:
            - name: dump
              mountPath: /dump
              readOnly: true
      volumes:
        - name: dump
          secret:
            secretName: {{ .Values.pdfDbMigration.dumpSecretName }}
{{- end }}