{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "govtool.serviceName" (dict "root" $ "name" $name) }}
  namespace: {{ $.Values.global.namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "govtool.name" $ }}
    app.kubernetes.io/component: {{ $name }}
  ports:
    - name: http
      port: {{ $svc.servicePort }}
      targetPort: {{ $svc.containerPort }}
{{- end }}
{{- end }}