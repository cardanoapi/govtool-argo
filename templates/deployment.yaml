{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "govtool.serviceName" (dict "root" $ "name" $name) }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "govtool.name" $ }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ default 1 $svc.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "govtool.name" $ }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "govtool.name" $ }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          {{- with $svc.command }}
          command:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with $svc.args }}
          args:
{{ toYaml . | indent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
          {{- with $svc.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
{{ toYaml $.Values.resources.default | indent 12 }}
          {{- if and $svc.configMount $svc.configMount.enabled }}
          volumeMounts:
            - name: config
              mountPath: {{ $svc.configMount.mountPath }}
              subPath: {{ $svc.configMount.subPath }}
              readOnly: true
          {{- end }}
      {{- if and $svc.configMount $svc.configMount.enabled }}
      volumes:
        - name: config
          secret:
            secretName: {{ $svc.configMount.secretName }}
      {{- end }}
{{- end }}
{{- end }}